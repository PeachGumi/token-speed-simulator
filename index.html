<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Speed Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    main {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    .subtitle {
      color: #9a9a9a;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .note {
      color: #666;
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
    }

    .lang-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .lang-btn {
      padding: 0.4rem 1rem;
      border: none;
      background: transparent;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn:first-child {
      border-right: 1px solid #333;
    }

    .lang-btn.active {
      background: #4a9eff;
      color: #000;
    }

    .lang-btn:focus-visible {
      outline: 2px solid #4a9eff;
      outline-offset: -2px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 70px;
      padding: 0.4rem 0.5rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #4a9eff;
    }

    input[type="number"]:focus-visible {
      border-color: #4a9eff;
      box-shadow: 0 0 0 2px #4a9eff33;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:focus-visible {
      outline: 2px solid #4a9eff;
      outline-offset: 2px;
    }

    .btn-primary {
      background: #4a9eff;
      color: #fff;
    }

    .btn-primary:hover { background: #3a8eef; }

    .btn-danger {
      background: #ff4a4a;
      color: #fff;
    }

    .btn-danger:hover { background: #ee3a3a; }

    .btn-secondary {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #333;
    }

    .btn-secondary:hover { background: #333; }

    .text-input-area {
      width: 100%;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 0.8rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: #ccc;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #4a9eff; }

    textarea:focus-visible {
      border-color: #4a9eff;
      box-shadow: 0 0 0 2px #4a9eff33;
    }

    textarea::placeholder { color: #888; }

    .output-container {
      width: 100%;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #222;
      border-radius: 8px;
      background: #111;
      padding: 1rem;
      position: relative;
      font-size: 1rem;
      line-height: 1.8;
    }

    .output-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #4a9eff;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
      .btn, input[type="number"], textarea, .preset-btn, .lang-btn { transition: none; }
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #8a8a8a;
    }

    .stats span { color: #4a9eff; font-weight: 600; }

    .preset-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .preset-btn {
      padding: 0.3rem 0.7rem;
      border: 1px solid #333;
      border-radius: 20px;
      background: transparent;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: #4a9eff;
      color: #4a9eff;
    }

    .preset-btn:focus-visible {
      outline: 2px solid #4a9eff;
      outline-offset: 2px;
    }

    .preset-btn.active {
      border-color: #4a9eff;
      color: #4a9eff;
      background: #4a9eff20;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title"><span lang="en">Token Speed Simulator</span></h1>
    <p class="subtitle" id="subtitle">LLMの出力速度を体感する</p>
    <p class="note" id="note">※ 表示速度は目安です。デバイスの性能によって実際と異なる場合があります</p>

    <div class="lang-toggle" role="group" aria-label="言語選択">
      <button class="lang-btn active" data-lang="ja" id="langJa" aria-pressed="true">日本語</button>
      <button class="lang-btn" data-lang="en" id="langEn" aria-pressed="false"><span lang="en">English</span></button>
    </div>

    <div class="preset-row" role="group" aria-label="速度プリセット">
      <button class="preset-btn" data-speed="5">5 tok/s</button>
      <button class="preset-btn" data-speed="10">10 tok/s</button>
      <button class="preset-btn active" data-speed="15">15 tok/s</button>
      <button class="preset-btn" data-speed="20">20 tok/s</button>
      <button class="preset-btn" data-speed="30">30 tok/s</button>
      <button class="preset-btn" data-speed="50">50 tok/s</button>
      <button class="preset-btn" data-speed="100">100 tok/s</button>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="speed" id="speedLabel">速度</label>
        <input type="number" id="speed" value="15" min="1" max="500" step="1">
        <span aria-hidden="true"><span lang="en">tok/sec</span></span>
      </div>
      <button class="btn btn-primary" id="startBtn" aria-label="アニメーション開始"><span lang="en">Start</span></button>
      <button class="btn btn-danger" id="stopBtn" disabled aria-label="アニメーション停止"><span lang="en">Stop</span></button>
      <button class="btn btn-secondary" id="clearBtn" aria-label="出力をクリア"><span lang="en">Clear</span></button>
    </div>

    <div class="text-input-area">
      <label for="inputText" class="sr-only" id="inputLabel">入力テキスト</label>
      <textarea id="inputText" placeholder="ここにテキストを貼り付けるか、デフォルトテキストを使用します..."></textarea>
    </div>

    <div class="output-container" id="outputContainer" aria-label="出力">
      <div class="output-text" id="outputText"></div><span class="cursor" id="cursor" style="display:none;" aria-hidden="true"></span>
    </div>

    <div class="stats" role="status" aria-live="off">
      <div id="tokenLabel">表示済み: <span id="tokenCount">0</span> <span lang="en">tokens</span></div>
      <div id="elapsedLabel">経過: <span id="elapsed">0.0</span>秒</div>
      <div id="speedLabel2">実測速度: <span id="actualSpeed">0</span> <span lang="en">tok/s</span></div>
    </div>
  </main>

  <script>
    const i18n = {
      ja: {
        title: 'Token Speed Simulator',
        subtitle: 'LLMの出力速度を体感する',
        note: '※ 表示速度は目安です。デバイスの性能によって実際と異なる場合があります',
        placeholder: 'ここにテキストを貼り付けるか、デフォルトテキストを使用します...',
        speedLabel: '速度',
        inputLabel: '入力テキスト',
        outputLabel: '出力',
        tokenLabel: '表示済み:',
        elapsedLabel: '経過:',
        speedLabel2: '実測速度:',
        startAria: 'アニメーション開始',
        stopAria: 'アニメーション停止',
        clearAria: '出力をクリア',
        langGroupLabel: '言語選択'
      },
      en: {
        title: 'Token Speed Simulator',
        subtitle: 'Experience LLM output speed',
        note: '* Speed is approximate. Actual speed may vary depending on your device.',
        placeholder: 'Paste text here or use the default text...',
        speedLabel: 'Speed',
        inputLabel: 'Input text',
        outputLabel: 'Output',
        tokenLabel: 'Tokens:',
        elapsedLabel: 'Elapsed:',
        speedLabel2: 'Speed:',
        startAria: 'Start animation',
        stopAria: 'Stop animation',
        clearAria: 'Clear output',
        langGroupLabel: 'Language selection'
      }
    };

    const defaultTexts = {
      ja: `このアプリは、大規模言語モデルの出力速度を体感するためのツールです。

テキスト欄にテキストを貼り付けるか、このデフォルトテキストを使用して、異なる速度を比較してみてください。

たとえば、一秒間に十五トークン程度表示されるのは、典型的なチャットボットの速度です。

五十トークンになると、かなり素早く表示されることが分かります。

逆に五トークンはゆっくりで、思考しながら回答しているような感覚を受けます。

速度を変えて、体感の違いを比較してみてください。`,
      en: `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.

Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.

Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.`
    };

    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const outputContainer = document.getElementById('outputContainer');
    const cursor = document.getElementById('cursor');
    const speedInput = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const tokenCountEl = document.getElementById('tokenCount');
    const elapsedEl = document.getElementById('elapsed');
    const actualSpeedEl = document.getElementById('actualSpeed');
    const presetBtns = document.querySelectorAll('.preset-btn');
    const langBtns = document.querySelectorAll('.lang-btn');
    const subtitleEl = document.getElementById('subtitle');
    const noteEl = document.getElementById('note');
    const titleEl = document.getElementById('title');
    const speedLabelEl = document.getElementById('speedLabel');
    const inputLabelEl = document.getElementById('inputLabel');
    const tokenLabelEl = document.getElementById('tokenLabel');
    const elapsedLabelEl = document.getElementById('elapsedLabel');
    const speedLabel2El = document.getElementById('speedLabel2');

    let currentLang = 'ja';
    let animating = false;
    let animationId = null;
    let charIndex = 0;
    let prevCharIndex = 0;
    let text = '';
    let startTime = 0;
    let tokensShown = 0;
    let lastTime = 0;
    let accumulator = 0;
    let prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => {
      prefersReducedMotion = e.matches;
    });

    function estimateTokensForChar(ch) {
      const code = ch.charCodeAt(0);
      if (code >= 0x4e00 && code <= 0x9fff) return 0.7;
      if (code >= 0x3040 && code <= 0x309f) return 0.7;
      if (code >= 0x30a0 && code <= 0x30ff) return 0.7;
      if (code >= 0xac00 && code <= 0xd7af) return 0.7;
      return 0.2;
    }

    function validateSpeed(val) {
      const n = parseInt(val);
      if (isNaN(n) || n < 1) return 1;
      if (n > 500) return 500;
      return n;
    }

    function getSpeed() {
      return validateSpeed(speedInput.value);
    }

    function updatePresetActive() {
      const speed = getSpeed();
      presetBtns.forEach(btn => {
        const isActive = parseInt(btn.dataset.speed) === speed;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive);
      });
    }

    function setLanguage(lang) {
      currentLang = lang;
      const t = i18n[lang];

      document.documentElement.lang = lang;

      langBtns.forEach(btn => {
        const isActive = btn.dataset.lang === lang;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive);
      });

      titleEl.innerHTML = `<span lang="en">${t.title}</span>`;
      subtitleEl.textContent = t.subtitle;
      noteEl.textContent = t.note;
      inputText.placeholder = t.placeholder;
      speedLabelEl.textContent = t.speedLabel;
      inputLabelEl.textContent = t.inputLabel;
      outputContainer.setAttribute('aria-label', t.outputLabel);
      tokenLabelEl.innerHTML = `${t.tokenLabel} <span id="tokenCount">0</span> <span lang="en">tokens</span>`;
      elapsedLabelEl.innerHTML = `${t.elapsedLabel} <span id="elapsed">0.0</span>秒`;
      speedLabel2El.innerHTML = `${t.speedLabel2} <span id="actualSpeed">0</span> <span lang="en">tok/s</span>`;

      startBtn.setAttribute('aria-label', t.startAria);
      stopBtn.setAttribute('aria-label', t.stopAria);
      clearBtn.setAttribute('aria-label', t.clearAria);

      document.querySelector('.lang-toggle').setAttribute('aria-label', t.langGroupLabel);

      if (inputText.value === '' || Object.values(defaultTexts).includes(inputText.value)) {
        inputText.value = '';
      }
    }

    function scrollToBottom() {
      outputContainer.scrollTop = outputContainer.scrollHeight;
    }

    function startAnimation() {
      if (animating) return;

      text = inputText.value.trim() || defaultTexts[currentLang];
      const speed = getSpeed();
      speedInput.value = speed;

      if (prefersReducedMotion) {
        outputText.textContent = text;
        tokensShown = Math.round(countTokens(text));
        document.getElementById('tokenCount').textContent = tokensShown;
        document.getElementById('elapsed').textContent = '0.0';
        document.getElementById('actualSpeed').textContent = speed;
        cursor.style.display = 'none';
        return;
      }

      let totalTokens = 0;
      for (let i = 0; i < text.length; i++) {
        totalTokens += estimateTokensForChar(text[i]);
      }
      if (totalTokens === 0) totalTokens = 1;
      const tokensPerChar = totalTokens / text.length;
      const charsPerSec = speed / tokensPerChar;
      const delayPerChar = 1000 / charsPerSec;

      animating = true;
      charIndex = 0;
      prevCharIndex = 0;
      tokensShown = 0;
      startTime = performance.now();
      lastTime = performance.now();
      accumulator = 0;
      outputText.textContent = '';
      cursor.style.display = 'inline-block';
      startBtn.disabled = true;
      stopBtn.disabled = false;

      function animate(timestamp) {
        if (!animating) return;

        let delta = timestamp - lastTime;
        lastTime = timestamp;

        if (delta < 0) delta = 0;
        if (delta > 100) delta = 100;

        accumulator += delta;

        while (accumulator >= delayPerChar && charIndex < text.length) {
          charIndex++;
          accumulator -= delayPerChar;
        }

        if (charIndex !== prevCharIndex) {
          outputText.textContent = text.slice(0, charIndex);

          for (let i = prevCharIndex; i < charIndex; i++) {
            tokensShown += estimateTokensForChar(text[i]);
          }
          prevCharIndex = charIndex;

          const elapsedSec = (timestamp - startTime) / 1000;
          document.getElementById('tokenCount').textContent = Math.round(tokensShown);
          document.getElementById('elapsed').textContent = elapsedSec.toFixed(1);
          if (elapsedSec > 0.1) {
            document.getElementById('actualSpeed').textContent = (tokensShown / elapsedSec).toFixed(1);
          }

          scrollToBottom();
        }

        if (charIndex >= text.length) {
          animating = false;
          cursor.style.display = 'none';
          startBtn.disabled = false;
          stopBtn.disabled = true;
          const elapsedSec = (timestamp - startTime) / 1000;
          if (elapsedSec > 0.1) {
            document.getElementById('actualSpeed').textContent = (tokensShown / elapsedSec).toFixed(1);
          }
          return;
        }

        animationId = requestAnimationFrame(animate);
      }

      animationId = requestAnimationFrame(animate);
    }

    function countTokens(str) {
      let count = 0;
      for (const ch of str) {
        count += estimateTokensForChar(ch);
      }
      return count;
    }

    function stopAnimation() {
      animating = false;
      if (animationId) cancelAnimationFrame(animationId);
      cursor.style.display = 'none';
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }

    startBtn.addEventListener('click', () => {
      stopAnimation();
      startAnimation();
    });

    stopBtn.addEventListener('click', stopAnimation);

    clearBtn.addEventListener('click', () => {
      stopAnimation();
      outputText.textContent = '';
      cursor.style.display = 'none';
      document.getElementById('tokenCount').textContent = '0';
      document.getElementById('elapsed').textContent = '0.0';
      document.getElementById('actualSpeed').textContent = '0';
    });

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        speedInput.value = btn.dataset.speed;
        updatePresetActive();
      });
    });

    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setLanguage(btn.dataset.lang);
      });
    });

    speedInput.addEventListener('input', () => {
      speedInput.value = validateSpeed(speedInput.value);
      updatePresetActive();
    });

    speedInput.addEventListener('blur', () => {
      speedInput.value = validateSpeed(speedInput.value);
      updatePresetActive();
    });

    inputText.value = '';
    updatePresetActive();
  </script>
</body>
</html>
